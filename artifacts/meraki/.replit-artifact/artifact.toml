kind = "web"
previewPath = "/"
title = "Meraki Moda Íntima"
version = "1.0.0"
id = "artifacts/meraki"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23713

[services.development]
run = "pnpm --filter @workspace/meraki run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meraki", "run", "build" ]
publicDir = "artifacts/meraki/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23713"
BASE_PATH = "/"
